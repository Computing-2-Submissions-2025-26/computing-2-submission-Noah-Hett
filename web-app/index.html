<!doctype html>
<html lang="en-gb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kingDOMino</title>
<meta name="description" content="Kingdomino — 2-player web app with drafting and scoring.">
<link rel="stylesheet" href="default.css">
<link rel="icon" href="./assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="app-header">
        <h1>king<span class="accent">DOM</span>ino</h1>
        <span id="phase-label"></span>
    </header>

    <!-- Top area: two boards + central meeple zone -->
    <section id="board-area">
        <div class="player-panel" id="player-P1">
            <div class="panel-header">
                <span class="player-name">Player 1</span>
                <span class="player-score" id="score-P1">0</span>
            </div>
            <div class="board-frame">
                <div class="game-board" id="board-P1"></div>
            </div>
        </div>

        <div id="center-zone">
            <div id="meeple-home">
                <div class="meeple-token" id="meeple-P1" data-player="P1"></div>
                <div class="meeple-token" id="meeple-P2" data-player="P2"></div>
            </div>
        </div>

        <div class="player-panel" id="player-P2">
            <div class="panel-header">
                <span class="player-name">Player 2</span>
                <span class="player-score" id="score-P2">0</span>
            </div>
            <div class="board-frame">
                <div class="game-board" id="board-P2"></div>
            </div>
        </div>
    </section>

    <!-- Bottom strip: controls + draft lines -->
    <section id="draft-strip">
        <div id="strip-controls">
            <div id="turn-indicator">
                <span id="turn-player"></span>
                <span id="turn-action"></span>
            </div>
            <button id="btn-rotate" title="Rotate domino (R)">↻ Rotate [R]</button>
        </div>

        <div id="draft-row">
            <div class="line-group" id="current-group">
                <span class="line-label">Current</span>
                <div id="current-line" class="tile-row"></div>
            </div>
            <div class="line-group" id="next-group">
                <span class="line-label">Next</span>
                <div id="next-line" class="tile-row"></div>
            </div>
        </div>

        <div id="message-bar" aria-live="polite"></div>
    </section>

    <script type="module" src="main.js"></script>
</body>
</html>
