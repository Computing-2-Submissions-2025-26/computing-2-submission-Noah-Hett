<!doctype html>
<html lang="en-gb">

<head>
    <!-- Head: meta, fonts, stylesheet -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kingDOMino</title>
    <meta name="description" content="Kingdomino — 2-player web app with drafting and scoring.">
    <link rel="stylesheet" href="default.css">
    <link rel="icon" href="./assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap" rel="stylesheet">
</head>

<body>
    <header id="app-header">
        <h1>King<span class="accent">dom</span>ino</h1>
    </header>

    <!-- Board area: two player boards side-by-side -->
    <section id="board-area">
        <div class="player-panel" id="player-P1">
            <div class="panel-header scroll-header">
                <div class="scroll-edge left"></div>
                <div class="scroll-body">
                    <span class="player-name">PLAYER 1</span>
                </div>
                <div class="scroll-edge right"></div>
            </div>
            <div class="board-frame">
                <div class="game-board" id="board-P1"></div>
            </div>
        </div>

        <div class="player-panel" id="player-P2">
            <div class="panel-header scroll-header">
                <div class="scroll-edge left"></div>
                <div class="scroll-body">
                    <span class="player-name">PLAYER 2</span>
                </div>
                <div class="scroll-edge right"></div>
            </div>
            <div class="board-frame">
                <div class="game-board" id="board-P2"></div>
            </div>
        </div>
    </section>

    <!-- Bottom strip: controls + current tiles | next tiles -->
    <section id="draft-strip">
        <div id="draft-row">
            <div class="line-group" id="current-group">
                <span class="line-label">Current</span>
                <div id="current-line" class="tile-row"></div>
            </div>

            <div class="line-group" id="next-group">
                <span class="line-label">Next</span>
                <div id="next-line" class="tile-row"></div>
            </div>
        </div>

        <div id="strip-controls">
            <div id="turn-indicator">
                <span id="turn-player"></span>
                <span id="turn-action"></span>
            </div>
            <button id="btn-rotate" title="Rotate domino (R)">ROTATE [R]</button>
            <div id="message-bar" aria-live="polite"></div>
        </div>
    </section>

    <!-- Game module entry point -->
    <script type="module" src="main.js"></script>
</body>

</html>
