<!doctype html>
<html lang="en-gb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kingDOMino</title>
<meta name="description" content="Kingdomino — 2-player web app with drafting and scoring.">
<link rel="stylesheet" href="default.css">
<link rel="icon" href="./assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="app-header">
        <h1>king<span class="accent">DOM</span>ino</h1>
        <div id="phase-display">
            <span id="phase-label"></span>
        </div>
    </header>

    <main id="app-main">
        <!-- Player 1 board -->
        <section class="player-section" id="player-P1">
            <div class="player-header">
                <span class="player-name">Player 1</span>
                <span class="player-score" id="score-P1">0</span>
            </div>
            <div class="game-board" id="board-P1" role="grid" aria-label="Player 1 board"></div>
        </section>

        <!-- Central drafting area -->
        <section id="draft-section">
            <div id="controls">
                <button id="btn-rotate" title="Rotate domino (R)">↻ Rotate</button>
                <div id="rotation-indicator">
                    <span class="rotation-label">Rotation:</span>
                    <span id="rotation-name">Right</span>
                </div>
            </div>

            <div id="turn-indicator">
                <span id="turn-player"></span>
                <span id="turn-action"></span>
            </div>

            <div id="message-bar" aria-live="polite"></div>

            <div id="draft-lines">
                <div class="draft-column" id="current-line-col">
                    <h3 class="draft-heading">Current</h3>
                    <div id="current-line" class="draft-line"></div>
                </div>
                <div class="draft-column" id="next-line-col">
                    <h3 class="draft-heading">Next</h3>
                    <div id="next-line" class="draft-line"></div>
                </div>
            </div>
        </section>

        <!-- Player 2 board -->
        <section class="player-section" id="player-P2">
            <div class="player-header">
                <span class="player-name">Player 2</span>
                <span class="player-score" id="score-P2">0</span>
            </div>
            <div class="game-board" id="board-P2" role="grid" aria-label="Player 2 board"></div>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
